
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Heart</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Mr+Dafoe&display=swap');

html, body {
  height: 100%;
  margin: 0;
  background: rgba(0,0,0,0.85);
}

body {
  display: flex;
  justify-content: center;
  align-items: center;
}

canvas {
  position: absolute;
  width: 100%;
  height: 100%;
}

.name{
  font-family: 'Mr Dafoe';
  font-size: 2.5em;
  color: white;
  text-shadow: 0 0 0.05em #fff, 0 0 0.2em #fe05e1, 0 0 0.3em #fe05e1;
  transform: rotate(-7deg);
  z-index:1000;
}
</style>
</head>

<body>

<canvas id="pinkboard"></canvas>
<h1 class="name">Ngọc Hiền</h1>

<script>
var settings = {
  particles: {
    length: 5000,
    duration: 2,
    velocity: 100,
    effect: -0.75,
    size: 8,
  },
};

var Point = function(x, y) {
  this.x = x || 0;
  this.y = y || 0;
};

Point.prototype.clone = function() {
  return new Point(this.x, this.y);
};

Point.prototype.length = function(length) {
  if (length === undefined)
    return Math.sqrt(this.x * this.x + this.y * this.y);
  this.normalize();
  this.x *= length;
  this.y *= length;
  return this;
};

Point.prototype.normalize = function() {
  var length = this.length();
  this.x /= length;
  this.y /= length;
  return this;
};

var Particle = function() {
  this.position = new Point();
  this.velocity = new Point();
  this.acceleration = new Point();
  this.age = 0;
};

Particle.prototype.initialize = function(x, y, dx, dy) {
  this.position.x = x;
  this.position.y = y;
  this.velocity.x = dx;
  this.velocity.y = dy;
  this.acceleration.x = dx * settings.particles.effect;
  this.acceleration.y = dy * settings.particles.effect;
  this.age = 0;
};

Particle.prototype.update = function(deltaTime) {
  this.position.x += this.velocity.x * deltaTime;
  this.position.y += this.velocity.y * deltaTime;
  this.velocity.x += this.acceleration.x * deltaTime;
  this.velocity.y += this.acceleration.y * deltaTime;
  this.age += deltaTime;
};

Particle.prototype.draw = function(context) {
  var ease = function(t) { return (--t) * t * t + 1; };
  var size = settings.particles.size * ease(this.age / settings.particles.duration);
  context.globalAlpha = 1 - this.age / settings.particles.duration;
  context.fillStyle = "#f50b02";
  context.beginPath();
  context.arc(this.position.x, this.position.y, size, 0, Math.PI * 2);
  context.fill();
};

var particles = [];

var canvas = document.getElementById('pinkboard');
var context = canvas.getContext('2d');

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

window.onresize = resize;
resize();

function pointOnHeart(t) {
  return new Point(
    160 * Math.pow(Math.sin(t), 3),
    130 * Math.cos(t) - 50 * Math.cos(2 * t)
    - 20 * Math.cos(3 * t) - 10 * Math.cos(4 * t) + 25
  );
}

function render() {
  requestAnimationFrame(render);
  context.clearRect(0, 0, canvas.width, canvas.height);

  for (var i = 0; i < settings.particles.length / 60; i++) {
    var pos = pointOnHeart(Math.PI - 2 * Math.PI * Math.random());
    var dir = pos.clone().length(settings.particles.velocity);
    var p = new Particle();
    p.initialize(canvas.width / 2 + pos.x, canvas.height / 2 - pos.y, dir.x, -dir.y);
    particles.push(p);
  }

  particles.forEach(function(p, i) {
    p.update(0.016);
    p.draw(context);
    if (p.age > settings.particles.duration) particles.splice(i, 1);
  });
}

render();
</script>

</body>
</html>
